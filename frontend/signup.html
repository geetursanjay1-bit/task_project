<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Team Task Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-box">
    <h2 class="text-center mb-4 text-gradient fw-bold">Create Account</h2>

    <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password (min 8 characters)" autocomplete="new-password">
    <input type="password" id="confirm_password" class="form-control mb-4" placeholder="Confirm Password" autocomplete="new-password">

    <button class="btn btn-primary w-100 mb-3" onclick="signup()">Signup</button>

    <p class="text-center text-secondary mb-0">
        Already have an account? <a href="login.html" class="fw-bold">Login</a>
    </p>
</div>

<script src="js/auth.js?v=3"></script>

</body>
</html>
