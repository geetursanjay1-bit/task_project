<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task - Team Task Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid dashboard-container my-0 py-0">
        <a class="navbar-brand text-gradient fw-bold" href="dashboard.html">Team Task Manager</a>
        <div class="d-flex gap-3">
            <a href="dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container-box mt-5">
    <h2 class="text-center mb-4 text-gradient fw-bold">Create Task</h2>

    <input type="text" id="title" class="form-control mb-3" placeholder="Task Title">
    <textarea id="description" class="form-control mb-3" rows="3" placeholder="Description"></textarea>
    
    <select id="project_id" class="form-control mb-3">
        <option value="" disabled selected>Select Project</option>
    </select>

    <select id="assigned_to" class="form-control mb-3">
        <option value="" disabled selected>Assign To (User ID)</option>
    </select>

    <select id="priority" class="form-control mb-3">
        <option value="LOW">Low</option>
        <option value="MEDIUM" selected>Medium</option>
        <option value="HIGH">High</option>
    </select>

    <input type="date" id="due_date" class="form-control mb-4">

    <button class="btn btn-primary w-100" onclick="createTask()">Create Task</button>
</div>

<script src="js/task.js"></script>

</body>
</html>
