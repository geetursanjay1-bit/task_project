<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Team Task Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-box">
    <h2 class="text-center mb-4 text-gradient fw-bold">Login</h2>

    <input type="text" id="login" class="form-control mb-3" placeholder="Email or Username" autocomplete="username">
    <input type="password" id="password" class="form-control mb-4" placeholder="Password">

    <button class="btn btn-primary w-100 mb-3" onclick="login()">Login</button>

    <p class="text-center text-secondary mb-0">
        Don't have an account? <a href="signup.html" class="fw-bold">Signup</a>
    </p>
</div>

<script src="js/auth.js?v=3"></script>

</body>
</html>
